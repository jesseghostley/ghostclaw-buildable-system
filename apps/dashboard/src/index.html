<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GhostClaw Runtime Dashboard</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Arial, sans-serif;
      }
      body {
        margin: 0;
        padding: 16px;
        background: #0f172a;
        color: #e2e8f0;
      }
      h1 {
        margin: 0 0 16px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 12px;
      }
      .panel {
        border: 1px solid #334155;
        border-radius: 8px;
        padding: 12px;
        background: #111827;
      }
      .panel h2 {
        margin: 0 0 8px;
        font-size: 1.05rem;
      }
      pre {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
        font-size: 12px;
      }
      .meta {
        margin: 8px 0 16px;
        color: #93c5fd;
        font-size: 0.9rem;
      }
      .error {
        color: #fca5a5;
      }
      /* Skill Invocations panel */
      .panel-full {
        grid-column: 1 / -1;
      }
      .si-filters {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-bottom: 10px;
      }
      .si-filters input,
      .si-filters select {
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 4px;
        color: #e2e8f0;
        font-size: 12px;
        padding: 4px 8px;
        font-family: monospace;
      }
      .si-filters input::placeholder {
        color: #64748b;
      }
      .si-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 12px;
      }
      .si-table th {
        text-align: left;
        padding: 6px 8px;
        border-bottom: 1px solid #334155;
        color: #93c5fd;
        font-weight: 600;
        white-space: nowrap;
      }
      .si-table td {
        padding: 5px 8px;
        border-bottom: 1px solid #1e293b;
        vertical-align: top;
      }
      .si-row {
        cursor: pointer;
      }
      .si-row:hover {
        background: #1e293b;
      }
      .si-row--failed {
        background: rgba(220, 38, 38, 0.08);
        border-left: 3px solid #dc2626;
      }
      .si-row--failed:hover {
        background: rgba(220, 38, 38, 0.15);
      }
      .si-mono {
        font-family: monospace;
      }
      /* Status badges */
      .si-badge {
        display: inline-block;
        padding: 1px 6px;
        border-radius: 3px;
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.03em;
      }
      .si-badge--pending {
        background: #334155;
        color: #94a3b8;
      }
      .si-badge--running {
        background: #1d4ed8;
        color: #bfdbfe;
        animation: si-pulse 1.5s ease-in-out infinite;
      }
      @keyframes si-pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.6; }
      }
      .si-badge--completed {
        background: #14532d;
        color: #4ade80;
      }
      .si-badge--failed {
        background: #7f1d1d;
        color: #fca5a5;
        font-weight: 700;
      }
      .si-badge--cancelled {
        background: #78350f;
        color: #fde68a;
      }
      /* Retry / fallback indicators */
      .si-indicator {
        display: inline-block;
        font-size: 10px;
        padding: 1px 4px;
        border-radius: 3px;
        font-family: monospace;
      }
      .si-indicator--retry {
        background: #1e3a5f;
        color: #93c5fd;
      }
      .si-indicator--fallback {
        background: #3b1f5e;
        color: #d8b4fe;
      }
      .si-detail-row td {
        padding: 0;
      }
      .si-detail-row {
        display: none;
      }
      .si-detail-row--expanded {
        display: table-row;
      }
      .si-detail {
        padding: 12px 16px;
        background: #0d1724;
        border-left: 3px solid #334155;
      }
      .si-detail-error {
        color: #fca5a5;
        margin-bottom: 10px;
        padding: 8px 10px;
        background: rgba(220, 38, 38, 0.12);
        border-radius: 4px;
        font-size: 12px;
      }
      .si-detail-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }
      .si-detail-col {
        min-width: 180px;
        flex: 1;
      }
      .si-detail-label {
        color: #93c5fd;
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 4px;
      }
      .si-detail-pre {
        background: #111827;
        border: 1px solid #334155;
        border-radius: 4px;
        padding: 6px 8px;
        font-size: 11px;
        max-height: 150px;
        overflow-y: auto;
        white-space: pre-wrap;
        word-break: break-word;
        margin: 0;
      }
      .si-detail-meta {
        font-size: 12px;
        font-family: monospace;
        line-height: 1.7;
      }
      .si-artifact-id {
        background: #1e293b;
        border-radius: 3px;
        padding: 1px 5px;
        font-size: 11px;
        color: #93c5fd;
        display: inline-block;
        margin: 1px 0;
      }
      .si-empty {
        color: #64748b;
        font-size: 12px;
        padding: 12px 0;
        font-family: monospace;
      }
    </style>
  </head>
  <body>
    <h1>GhostClaw Runtime Dashboard</h1>
    <div id="meta" class="meta">Loading...</div>

    <div class="grid">
      <section class="panel">
        <h2>Runtime Status</h2>
        <pre id="runtime-status">Loading...</pre>
      </section>

      <section class="panel">
        <h2>Queue</h2>
        <pre id="queue">Loading...</pre>
      </section>

      <section class="panel">
        <h2>Agents</h2>
        <pre id="agents">Loading...</pre>
      </section>

      <section class="panel">
        <h2>Artifacts</h2>
        <pre id="artifacts">Loading...</pre>
      </section>

      <section class="panel">
        <h2>Planner Strategies</h2>
        <pre id="planner-strategies">Loading...</pre>
      </section>

      <section class="panel panel-full">
        <h2>Skill Invocations</h2>
        <div class="si-filters">
          <input type="text" id="si-filter-workspace" placeholder="Workspace" />
          <input type="text" id="si-filter-agent" placeholder="Agent" />
          <input type="text" id="si-filter-skill" placeholder="Skill" />
          <select id="si-filter-status">
            <option value="">All Statuses</option>
            <option value="pending">pending</option>
            <option value="running">running</option>
            <option value="completed">completed</option>
            <option value="failed">failed</option>
            <option value="cancelled">cancelled</option>
          </select>
        </div>
        <div id="skill-invocations">Loading...</div>
      </section>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
